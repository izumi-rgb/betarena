# Example override for VPS deployment.
# Copy to repo root as docker-compose.override.yml and set PUBLIC_API_BASE.
# Usage: PUBLIC_API_BASE=http://YOUR_SERVER_IP:4000 docker compose up -d
#
# Or rename to docker-compose.override.yml and replace YOUR_PUBLIC_IP with your EC2 public IP.

services:
  web:
    environment:
      NEXT_PUBLIC_API_URL: http://YOUR_PUBLIC_IP:4000
      NEXT_PUBLIC_WS_URL: http://YOUR_PUBLIC_IP:4000
