services:
  postgres:
    image: postgres:15-alpine
    container_name: betarena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: betarena
      POSTGRES_USER: betarena
      POSTGRES_PASSWORD: betarena_dev_password
    ports:
      # Use non-default host ports in dev to avoid collisions with local services.
      # Override via POSTGRES_HOST_PORT/REDIS_HOST_PORT if needed.
      - '127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U betarena']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    container_name: betarena-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$REDIS_PASSWORD" ping']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: betarena-api
    restart: unless-stopped
    ports:
      - '127.0.0.1:4000:4000'
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: betarena-web
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_WS_URL: http://api:4000
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'

volumes:
  postgres_data:
  redis_data:
