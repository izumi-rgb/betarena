services:
  postgres:
    image: postgres:15-alpine
    container_name: betarena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: betarena
      POSTGRES_USER: betarena
      POSTGRES_PASSWORD: betarena_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U betarena']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: betarena-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: betarena-api
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: betarena-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_WS_URL: http://api:4000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
