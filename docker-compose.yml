services:
  postgres:
    image: postgres:15-alpine
    container_name: betarena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: betarena
      POSTGRES_USER: betarena
      POSTGRES_PASSWORD: betarena_dev_password
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U betarena']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: betarena-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
