# ══════════════════════════════════════════════════════════════
# Dev-only overrides (auto-merged by `docker compose up`)
# - Keep API/Web containers disabled; run them locally with npm.
# - DB/Redis host ports are defined in docker-compose.yml using
#   POSTGRES_HOST_PORT/REDIS_HOST_PORT (defaults: 5433/6380).
# ══════════════════════════════════════════════════════════════

services:
  api:
    profiles:
      - production

  web:
    profiles:
      - production
