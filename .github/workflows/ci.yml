name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck --workspace=apps/api
      - run: npm run lint --workspace=apps/web

  test-api:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_NAME: bitarena_test
      DB_USER: test
      DB_PASSWORD: test
      JWT_SECRET: test-jwt-secret-key-for-unit-tests
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-key-for-unit-tests
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ''
      CORS_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm test --workspace=apps/api

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm test --workspace=apps/web

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-api, test-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=apps/api
      - run: npm run build --workspace=apps/web
